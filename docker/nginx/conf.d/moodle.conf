# =============================================================================
# MoodleFlux - Nginx virtual host for Moodle LMS
# Basado en: ADR-001, ADR-002, ADR-006
# =============================================================================

upstream php-fpm {
    server php-fpm:9000;
    keepalive 32;
}

server {
    listen 443 ssl http2;
    server_name localhost moodleflux.local;

    # SSL (ADR-006)
    ssl_certificate /etc/nginx/ssl/moodleflux.crt;
    ssl_certificate_key /etc/nginx/ssl/moodleflux.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS (ADR-006)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    root /var/www/html;
    index index.php index.html;

    # Health check endpoint (ADR-008)
    location /health {
        access_log off;
        try_files /dev/null /health.php;
    }

    # Archivos estáticos con cacheo largo
    location ~* \.(jpg|jpeg|gif|png|css|js|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri /index.php?$query_string;
    }

    # moodledata - archivos subidos (acceso interno)
    location /moodledata {
        internal;
        alias /var/www/moodledata;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Rewrite de Moodle (clean URLs)
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Proxy a PHP-FPM
    location ~ [^/]\.php(/|$) {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass php-fpm;
        fastcgi_index index.php;

        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;

        fastcgi_buffer_size 128k;
        fastcgi_buffers 8 128k;
        fastcgi_read_timeout 120s;
        fastcgi_send_timeout 60s;

        fastcgi_param HTTPS on;
    }

    # Denegar acceso a archivos ocultos
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Páginas de error
    error_page 404 /index.php;
    error_page 500 502 503 504 /error/5xx.html;

    access_log /var/log/nginx/moodle_access.log json_combined;
    error_log /var/log/nginx/moodle_error.log warn;
}
