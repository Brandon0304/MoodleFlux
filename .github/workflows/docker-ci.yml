# =============================================================================
# Workflow: Integración Continua - Docker
# Propósito: Validar la configuración Docker del stack Moodle LMS
# =============================================================================

name: Docker CI

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
    paths:
      - 'docker/**'
      - 'docker-compose*.yml'
      - '**/Dockerfile*'
  pull_request:
    branches: [main]
    paths:
      - 'docker/**'
      - 'docker-compose*.yml'
      - '**/Dockerfile*'

jobs:
  validate-compose:
    name: Validar docker-compose
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validar sintaxis de docker-compose.yml
        run: |
          if [ -f docker-compose.yml ]; then
            docker compose config
            echo "✅ docker-compose.yml válido"
          else
            echo "⚠️ docker-compose.yml no encontrado (se creará en etapa de implementación)"
          fi

  lint-dockerfiles:
    name: Lint Dockerfiles
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint Dockerfiles with hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/php-fpm/Dockerfile
          failure-threshold: warning
        continue-on-error: true  # Hasta que exista el Dockerfile

      - name: Verificar Dockerfiles existentes
        run: |
          echo "=== Dockerfiles en el proyecto ==="
          find . -name "Dockerfile*" -not -path "./.git/*" 2>/dev/null | sort || echo "⚠️ No hay Dockerfiles aún"

  build-php-fpm:
    name: Build PHP-FPM image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build PHP-FPM image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/php-fpm/Dockerfile
          push: false
          tags: moodle-php-fpm:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
        continue-on-error: true  # Hasta que exista el Dockerfile

  security-scan-docker:
    name: Escanear imágenes Docker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy on Dockerfiles
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: 'docker/'
          format: 'table'
          exit-code: '1'
          severity: 'HIGH,CRITICAL'
        continue-on-error: true  # Hasta que existan los Dockerfiles

  notify:
    name: Notificar resultado
    runs-on: ubuntu-latest
    needs: [validate-compose, lint-dockerfiles]
    if: failure() && github.ref == 'refs/heads/main'
    steps:
      - name: Notificar fallo
        run: |
          echo "❌ El pipeline Docker CI falló en main"
          echo "Revisar: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
