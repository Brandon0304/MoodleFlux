# =============================================================================
# Workflow: Escaneo de Seguridad
# Propósito: Detectar vulnerabilidades en dependencias, configuraciones
#            exposición de secrets
# =============================================================================

name: Escaneo de Seguridad

on:
  schedule:
    # Ejecutar todos los lunes a las 6:00 AM
    - cron: '0 6 * * 1'
  workflow_dispatch:
    # Permitir ejecución manual desde GitHub UI

jobs:
  secret-scan:
    name: Escaneo de secrets en repositorio
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: GitLeaks - Detectar secrets en commits
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true  # No bloquear, solo reportar

  dependency-scan:
    name: Escaneo de dependencias
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy - Escaneo completo del repositorio
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'HIGH,CRITICAL'

      - name: Subir resultados a GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy'
        continue-on-error: true

  dockerfile-scan:
    name: Escaneo de Dockerfiles
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy on Docker configs
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: '.'
          format: 'table'
          severity: 'HIGH,CRITICAL'
        continue-on-error: true

  notify-security:
    name: Notificar resultados
    runs-on: ubuntu-latest
    needs: [secret-scan, dependency-scan]
    if: always()
    steps:
      - name: Resumen de escaneo
        run: |
          echo "## 🔒 Resultados del Escaneo de Seguridad" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Repositorio**: ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Fecha**: $(date '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- **Rama**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Revisar resultados en: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
