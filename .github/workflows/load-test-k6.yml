name: Pruebas de Carga

on: workflow_dispatch

jobs:
  k6-load-test:
    name: Ejecutar k6
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Crear script de prueba
        run: |
          cat > k6-test.js << 'K6EOF'
import http from 'k6/http';
import { check, sleep } from 'k6';

const TARGET = __ENV.TARGET_URL || 'https://localhost';
const VUS = __ENV.VUS || 50;

export const options = {
  stages: [
    { duration: '30s', target: VUS },
    { duration: '2m', target: VUS },
    { duration: '30s', target: 0 },
  ],
  thresholds: {
    http_req_duration: ['p(95)<500'],
    http_req_failed: ['rate<0.01'],
  },
};

export default function () {
  const responses = http.batch([
    ['GET', TARGET + '/', null, { tags: { name: 'homepage' } }],
    ['GET', TARGET + '/login/index.php', null, { tags: { name: 'login' } }],
  ]);

  check(responses[0], {
    'homepage status 200': (r) => r.status === 200,
  });
  check(responses[1], {
    'login page status 200': (r) => r.status === 200,
  });

  sleep(Math.random() * 3 + 1);
}
K6EOF

      - name: Ejecutar k6
        run: |
          k6 run \
            --vus 50 \
            --duration 2m \
            --summary-export=k6-results.json \
            -e TARGET_URL=https://localhost \
            -e VUS=50 \
            k6-test.js
        continue-on-error: true

      - name: Publicar resultados
        uses: actions/upload-artifact@v4
        with:
          name: k6-results
          path: |
            k6-results.json
            k6-test.js
